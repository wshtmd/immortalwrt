name: 🚀 编译|OAF+NVR|24.10稳定版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 📦 1. 拉取源码
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: openwrt-24.10
          fetch-depth: 0

      - name: 🔍 1.1 验证分支
        run: |
          git branch --show-current
          grep KERNEL_PATCHVER target/linux/ramips/Makefile

      - name: ⚙️ 2. 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev gawk zlib1g-dev git python3 python3-pip unzip wget curl file
          pip3 install --break-system-packages pyyaml pygments markdown Unidecode

      - name: 📥 3. 下载插件源码
        run: |
          rm -rf package/QModem package/OpenAppFilter package/kenzok8 package/small
          git clone https://github.com/wshcxl/QModem.git package/QModem
          git clone https://github.com/wshcxl/Open-App.git package/OpenAppFilter
          git clone --depth=1 https://github.com/kenzok8/openwrt-packages package/kenzok8 || true
          git clone --depth=1 https://github.com/kenzok8/small package/small || true

      - name: 🔌 4. 更新 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🌏 4.5 配置软件源
        run: |
          mkdir -p files/etc/opkg
          cat > files/etc/opkg/distfeeds.conf << 'EOS'
          src/gz immortalwrt_core https://mirrors.tuna.tsinghua.edu.cn/immortalwrt/releases/24.10/targets/ramips/mt7621/packages
          src/gz immortalwrt_kmods https://mirrors.tuna.tsinghua.edu.cn/immortalwrt/releases/24.10/packages/mipsel_24kc/kmods
          src/gz immortalwrt_base https://mirrors.tuna.tsinghua.edu.cn/immortalwrt/releases/24.10/packages/mipsel_24kc/base
          src/gz immortalwrt_luci https://mirrors.tuna.tsinghua.edu.cn/immortalwrt/releases/24.10/packages/mipsel_24kc/luci
          src/gz immortalwrt_packages https://mirrors.tuna.tsinghua.edu.cn/immortalwrt/releases/24.10/packages/mipsel_24kc/packages
          src/gz immortalwrt_routing https://mirrors.tuna.tsinghua.edu.cn/immortalwrt/releases/24.10/packages/mipsel_24kc/routing
          src/gz immortalwrt_telephony https://mirrors.tuna.tsinghua.edu.cn/immortalwrt/releases/24.10/packages/mipsel_24kc/telephony          EOS
          cat > files/etc/opkg/customfeeds.conf << 'EOS'
          src/gz kenzok8 https://raw.githubusercontent.com/kenzok8/openwrt-packages/main
          src/gz small https://raw.githubusercontent.com/kenzok8/small/main
          EOS
          cat > files/etc/opkg.conf << 'EOS'
          dest root /
          dest ram /tmp
          lists_dir ext /var/opkg-lists
          option overlay_root /overlay
          option check_signature
          EOS

      - name: 📝 5. 生成 .config
        run: |
          rm -f .config
          cat > .config << 'EOS'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_hiwifi_hc5962=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-mod-network=y
          CONFIG_PACKAGE_luci-mod-status=y
          CONFIG_PACKAGE_luci-mod-system=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_LUCI_LANG_zh-cn=y
          CONFIG_LUCI_DEFAULT_LANG=zh-cn
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_kmod-cfg80211=y
          CONFIG_PACKAGE_kmod-mac80211=y
          CONFIG_PACKAGE_kmod-mt7603=y
          CONFIG_PACKAGE_kmod-mt76x2=y
          CONFIG_PACKAGE_wpad-basic-wolfssl=y
          CONFIG_PACKAGE_luci-proto-wireless=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-proto-pppoe=y
          CONFIG_PACKAGE_kmod-usb-net-rndis=y
          CONFIG_PACKAGE_kmod-usb-net=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb2=y
          CONFIG_PACKAGE_usb-modeswitch=y
          CONFIG_PACKAGE_comgt=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_luci-app-qmodem-next=y
          CONFIG_PACKAGE_adbyby=y
          CONFIG_PACKAGE_luci-app-adbyby-plus=y          CONFIG_PACKAGE_miniupnpd=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-oaf=y
          CONFIG_PACKAGE_luci-i18n-oaf-zh-cn=y
          CONFIG_PACKAGE_ffmpeg=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_jq=y
          CONFIG_PACKAGE_onvif-utils=y
          CONFIG_PACKAGE_samba36-server=y
          CONFIG_PACKAGE_luci-app-samba=y
          CONFIG_PACKAGE_nmap=y
          CONFIG_PACKAGE_luci-app-opkg=y
          CONFIG_TARGET_ROOT_PASSWORD="password"
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          EOS
          make defconfig

      - name: 📡 5.5 预设 WiFi
        run: |
          mkdir -p files/etc/config
          cat > files/etc/config/wireless << 'EOS'
          config wifi-device 'radio0'
              option type 'mac80211'
              option band '2g'
              option channel '11'
              option htmode 'HT20'
              option disabled '0'

          config wifi-iface 'default_radio0'
              option device 'radio0'
              option network 'lan'
              option mode 'ap'
              option ssid 'ImmortalWrt_2G'
              option encryption 'psk2'
              option key 'zxcvbnm.0'

          config wifi-device 'radio1'
              option type 'mac80211'
              option band '5g'
              option channel '149'
              option htmode 'VHT80'
              option disabled '0'

          config wifi-iface 'default_radio1'
              option device 'radio1'
              option network 'lan'
              option mode 'ap'
              option ssid 'ImmortalWrt_5G'
              option encryption 'psk2'              option key 'zxcvbnm.0'
          EOS

      - name: 🔧 5.1 屏蔽编译期下载
        run: |
          find package/OpenAppFilter package/kenzok8 package/small -type f -name "Makefile" -exec sed -i '/curl\|wget\|DOWNLOAD\|FETCH\|\.db\|\.zip/s/^/#DISABLED: /' {} +
          mkdir -p files/usr/share/oaf files/usr/share/adbyby
          touch files/usr/share/oaf/oaf.db files/usr/share/oaf/feature.db files/usr/share/adbyby/adbyby.db

      - name: 📥 6. 下载源码
        run: make download -j$(nproc)

      - name: 🏗️ 7. 编译
        run: make -j$(nproc)

      - name: 🧹 8. 收集固件
        run: |
          mkdir -p firmware_output
          find bin -type f -name "*hiwifi*" -exec cp {} firmware_output/ \;
          ls -lh firmware_output/ || echo "未找到固件"

      - name: 📤 9. 上传
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-hc5962-24.10-Stable
          path: firmware_output/*.bin
