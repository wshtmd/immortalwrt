name: 🚀 监控|OAF+NVR|汉化+无线修复版|全核稳定编译

on:
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📦 1. 拉取源码
        uses: actions/checkout@v4

      - name: ⚙️ 2. 准备环境与依赖（✅ 修复 pip 参数报错）
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk zlib1g-dev git python3 python3-pip unzip wget curl file
          # 移除 --break-system-packages，兼容 GH Runner 的 pip 22.x
          pip3 install pyyaml pygments markdown Unidecode

      - name: 📥 3. 添加插件源（带重试机制）
        run: |
          echo "👉 正在下载 5G Modem Support 插件..."
          rm -rf package/QModem
          git clone https://github.com/wshcxl/QModem.git package/QModem
          
          echo "👉 正在下载 OpenAppFilter (OAF) 插件..."
          rm -rf package/OpenAppFilter
          git clone https://github.com/wshcxl/Open-App.git package/OpenAppFilter
          
          echo "👉 正在添加第三方插件源（带重试）..."
          for i in 1 2 3; do
            git clone --depth=1 https://github.com/kenzok8/openwrt-packages package/kenzok8 && break
            echo "⚠️ kenzok8 第 $i 次克隆失败，5秒后重试..."
            sleep 5
          done
          for i in 1 2 3; do
            git clone --depth=1 https://github.com/kenzok8/small package/small && break
            echo "⚠️ small 第 $i 次克隆失败，5秒后重试..."
            sleep 5
          done

      - name: 🔌 4. 更新 Feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🌏 4.5 预置国内镜像源配置        run: |
          MIRROR="https://mirrors.tuna.tsinghua.edu.cn/immortalwrt/releases/23.05.0"
          TARGET_PKG="$MIRROR/targets/ramips/mt7621/packages"
          GENERIC_PKG="$MIRROR/packages/mipsel_24kc"
          
          mkdir -p files/etc/opkg
          echo "src/gz immortalwrt_core $TARGET_PKG" > files/etc/opkg/distfeeds.conf
          echo "src/gz immortalwrt_kmods $GENERIC_PKG/kmods" >> files/etc/opkg/distfeeds.conf
          echo "src/gz immortalwrt_base $GENERIC_PKG/base" >> files/etc/opkg/distfeeds.conf
          echo "src/gz immortalwrt_luci $GENERIC_PKG/luci" >> files/etc/opkg/distfeeds.conf
          echo "src/gz immortalwrt_packages $GENERIC_PKG/packages" >> files/etc/opkg/distfeeds.conf
          echo "src/gz immortalwrt_routing $GENERIC_PKG/routing" >> files/etc/opkg/distfeeds.conf
          echo "src/gz immortalwrt_telephony $GENERIC_PKG/telephony" >> files/etc/opkg/distfeeds.conf
          echo "src/gz kenzok8 https://raw.githubusercontent.com/kenzok8/openwrt-packages/main" >> files/etc/opkg/customfeeds.conf
          echo "src/gz small https://raw.githubusercontent.com/kenzok8/small/main" >> files/etc/opkg/customfeeds.conf
          echo "dest root /" > files/etc/opkg.conf
          echo "dest ram /tmp" >> files/etc/opkg.conf
          echo "lists_dir ext /var/opkg-lists" >> files/etc/opkg.conf
          echo "option overlay_root /overlay" >> files/etc/opkg.conf
          echo "option check_signature" >> files/etc/opkg.conf
          echo "✅ 国内镜像源配置已预置"

      - name: 📝 5. 深度配置
        run: |
          rm -f .config
          echo "CONFIG_TARGET_ramips=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_hiwifi_hc5962=y" >> .config
          echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-base=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-admin-full=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-network=y" >> .config
          echo "CONFIG_PACKAGE_luci-mod-status=y" >> .config
          echo "CONFIG_LUCI_LANG_zh-cn=y" >> .config
          echo "CONFIG_LUCI_DEFAULT_LANG=zh-cn" >> .config
          echo "CONFIG_PACKAGE_luci-theme-argon=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-admin-full-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-network-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-wireless-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-opkg-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-system-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-services-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-status-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-adbyby-plus-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-samba-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-oaf-zh-cn=y" >> .config          echo "CONFIG_PACKAGE_kmod-cfg80211=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mac80211=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt7603=y" >> .config
          echo "CONFIG_PACKAGE_kmod-mt76x2=y" >> .config
          echo "CONFIG_PACKAGE_wpad-basic-wolfssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-wireless=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-wireless=y" >> .config
          echo "CONFIG_PACKAGE_firewall4=y" >> .config
          echo "CONFIG_PACKAGE_luci-proto-pppoe=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net-rndis=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-net=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb3=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb2=y" >> .config
          echo "CONFIG_PACKAGE_usb-modeswitch=y" >> .config
          echo "CONFIG_PACKAGE_comgt=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-qmodem-next=y" >> .config
          echo "CONFIG_PACKAGE_adbyby=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-adbyby-plus=y" >> .config
          echo "CONFIG_PACKAGE_miniupnpd=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-upnp=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-oaf=y" >> .config
          echo "CONFIG_PACKAGE_ffmpeg=y" >> .config
          echo "CONFIG_PACKAGE_curl=y" >> .config
          echo "CONFIG_PACKAGE_jq=y" >> .config
          echo "CONFIG_PACKAGE_onvif-utils=y" >> .config
          echo "CONFIG_PACKAGE_samba36-server=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-samba=y" >> .config
          echo "CONFIG_PACKAGE_nmap=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-opkg=y" >> .config
          echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
          echo "CONFIG_TARGET_ROOT_PASSWORD=\"password\"" >> .config
          echo "CONFIG_ALL_NONSHARED=n" >> .config
          echo "CONFIG_ALL_KMODS=n" >> .config
          make defconfig

      - name: 🔧 5.1 绝对屏蔽特征库下载（防海外网络超时）
        run: |
          echo "👉 正在彻底屏蔽 OAF/Adbyby 编译期下载逻辑..."
          for f in $(find package/OpenAppFilter package/kenzok8 package/small -type f -name "Makefile" 2>/dev/null); do
            sed -i '/curl\|wget\|DOWNLOAD\|FETCH\|\.db\|\.zip\|hxapi\|maimaitom/s/^/#DISABLED: /' "$f"
          done
          echo "✅ 已注释所有 Makefile 下载指令"
          rm -f package/OpenAppFilter/*/url.txt package/OpenAppFilter/*/ipLoad.txt 2>/dev/null
          mkdir -p files/usr/share/oaf files/usr/share/adbyby
          touch files/usr/share/oaf/oaf.db files/usr/share/oaf/feature.db files/usr/share/adbyby/adbyby.db
          echo "✅ 已生成空特征库占位文件"
          echo "CONFIG_OAF_AUTO_UPDATE=n" >> .config
          echo "CONFIG_ADBYBY_AUTO_UPDATE=n" >> .config

      - name: 📡 5.5 预设 WiFi 配置        run: |
          mkdir -p files/etc/config
          mkdir -p files/etc/hotplug.d/iface
          echo "config wifi-device 'radio0'" > files/etc/config/wireless
          echo "    option type 'mac80211'" >> files/etc/config/wireless
          echo "    option channel '11'" >> files/etc/config/wireless
          echo "    option hwmode '11g'" >> files/etc/config/wireless
          echo "    option htmode 'HT20'" >> files/etc/config/wireless
          echo "    option disabled '0'" >> files/etc/config/wireless
          echo "" >> files/etc/config/wireless
          echo "config wifi-iface" >> files/etc/config/wireless
          echo "    option device 'radio0'" >> files/etc/config/wireless
          echo "    option network 'lan'" >> files/etc/config/wireless
          echo "    option mode 'ap'" >> files/etc/config/wireless
          echo "    option ssid 'immortalwrt'" >> files/etc/config/wireless
          echo "    option encryption 'psk2'" >> files/etc/config/wireless
          echo "    option key 'zxcvbnm.0'" >> files/etc/config/wireless
          echo "" >> files/etc/config/wireless
          echo "config wifi-device 'radio1'" >> files/etc/config/wireless
          echo "    option type 'mac80211'" >> files/etc/config/wireless
          echo "    option channel '149'" >> files/etc/config/wireless
          echo "    option hwmode '11a'" >> files/etc/config/wireless
          echo "    option htmode 'VHT80'" >> files/etc/config/wireless
          echo "    option disabled '0'" >> files/etc/config/wireless
          echo "" >> files/etc/config/wireless
          echo "config wifi-iface" >> files/etc/config/wireless
          echo "    option device 'radio1'" >> files/etc/config/wireless
          echo "    option network 'lan'" >> files/etc/config/wireless
          echo "    option mode 'ap'" >> files/etc/config/wireless
          echo "    option ssid 'immortalwrt-5G'" >> files/etc/config/wireless
          echo "    option encryption 'psk2'" >> files/etc/config/wireless
          echo "    option key 'zxcvbnm.0'" >> files/etc/config/wireless
          echo "#!/bin/sh" > files/etc/hotplug.d/iface/99-wifi-fix
          echo '[ "$ACTION" = "ifup" ] && [ "$INTERFACE" = "lan" ] && {' >> files/etc/hotplug.d/iface/99-wifi-fix
          echo "  if ! grep -q \"option path\" /etc/config/wireless 2>/dev/null; then" >> files/etc/hotplug.d/iface/99-wifi-fix
          echo "    wifi detect > /tmp/wireless.new" >> files/etc/hotplug.d/iface/99-wifi-fix
          echo "    grep \"option ssid\|option key\|option encryption\" /etc/config/wireless >> /tmp/wireless.new 2>/dev/null" >> files/etc/hotplug.d/iface/99-wifi-fix
          echo "    mv /tmp/wireless.new /etc/config/wireless" >> files/etc/hotplug.d/iface/99-wifi-fix
          echo "    wifi reload" >> files/etc/hotplug.d/iface/99-wifi-fix
          echo "  fi" >> files/etc/hotplug.d/iface/99-wifi-fix
          echo "}" >> files/etc/hotplug.d/iface/99-wifi-fix
          chmod +x files/etc/hotplug.d/iface/99-wifi-fix

      - name: 📥 6. 下载源码包
        run: make download -j$(nproc)

      - name: 🏗️ 7. 开始编译（全核 + 精简日志）
        run: make -j$(nproc)

      - name: 🧹 8. 收集固件        run: |
          mkdir -p firmware_output
          find bin -type f -name "*hiwifi*factory*.bin" -exec cp {} firmware_output/ \;
          if [ ! "$(ls -A firmware_output/*.bin 2>/dev/null)" ]; then
            find bin -type f -name "*hiwifi*squashfs*.bin" -exec cp {} firmware_output/ \;
          fi
          echo "✅ 编译产物："
          ls -lh firmware_output/
          echo "=========================================="
          echo "🎉 固件编译完成！"
          echo "📱 默认登录：192.168.1.1 / root / password"
          echo "🌐 默认语言：中文"
          echo "📶 WiFi: immortalwrt / immortalwrt-5G / zxcvbnm.0"
          echo "=========================================="

      - name: 📤 9. 上传固件
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-hc5962-CN-Final-Stable
          path: firmware_output/*.bin
